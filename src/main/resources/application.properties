# Application Configuration
spring.application.name=hotel-emenu-system
server.port=${PORT:8080}

# Database Configuration (H2 In-Memory - Works on cloud with no file system)
spring.datasource.url=jdbc:h2:mem:hotel_emenu;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (disabled in production for security)
spring.h2.console.enabled=false

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File Storage Path
file.upload-dir=uploads/menu-images

# Logging Configuration
logging.level.org.springframework.web=WARN
logging.level.com.hotel.emenu=INFO
logging.level.org.hibernate.SQL=WARN

# Session Configuration
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Error Configuration
server.error.include-message=always
server.error.include-binding-errors=always
