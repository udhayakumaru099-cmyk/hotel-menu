# Application Configuration
spring.application.name=hotel-emenu-system
server.port=8080

# Database Configuration (H2 Embedded - Zero Setup Needed)
spring.datasource.url=jdbc:h2:file:./data/hotel_emenu;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Configuration (To use MySQL, comment out H2 and uncomment these)
#spring.datasource.url=jdbc:mysql://localhost:3306/hotel_emenu?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use H2 Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.file-size-threshold=2KB

# File Storage Path
file.upload-dir=uploads/menu-images

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.hotel.emenu=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Session Configuration
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Error Configuration
server.error.include-message=always
server.error.include-binding-errors=always
